services:
  - type: web
    name: propel-dialer-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/server.js   # schema already applied; keep boot DB-independent so the server never hangs on startup
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false          # set in Render dashboard → paste Supabase pooler URL
      - key: DIRECT_URL
        sync: false          # set in Render dashboard → paste Supabase direct URL
      - key: JWT_SECRET
        generateValue: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_API_KEY
        sync: false
      - key: TWILIO_API_SECRET
        sync: false
      - key: TWILIO_TWIML_APP_SID
        sync: false
      - key: TWILIO_CALLER_ID
        sync: false
      - key: FRONTEND_URL
        sync: false          # e.g. https://propel-dialer.vercel.app
      - key: AGENT_NAME
        sync: false
      - key: AGENT_PHONE
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AGENT_MODEL
        sync: false
      # Stripe removed — per-client custom deployment, no SaaS billing
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: BACKEND_URL
        sync: false          # e.g. https://propel-dialer-backend.onrender.com — used for Twilio webhooks
      - key: ENCRYPTION_KEY
        generateValue: true  # C4: AES-256 key for iCloud credential encryption — auto-generated
      - key: GOOGLE_CLIENT_ID
        sync: false          # M1: Google OAuth app client ID (for Gmail connect)
      - key: GOOGLE_CLIENT_SECRET
        sync: false          # M1: Google OAuth app client secret
